<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理后台 - ZHDD网安空间</title>
    <!-- 网站图标 -->
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        a { color: #00f5d4; text-decoration: none; }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #5a738a;
            font-size: 0.9rem;
            transition: 0.3s;
            z-index: 10;
        }
        .back-link:hover { color: #00f5d4; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .card h2 {
            color: #00f5d4;
            margin-bottom: 1rem;
            font-size: 1.6rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 0.5rem;
        }
        .field { margin-bottom: 1.2rem; }
        .field label {
            display: block;
            color: #8aa3bc;
            margin-bottom: 4px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .field input, .field textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #e8edf5;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .field input:focus, .field textarea:focus {
            border-color: #00f5d4;
            box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }
        .field textarea { min-height: 60px; resize: vertical; }
        .field textarea.large { min-height: 200px; }
        .btn {
            background: linear-gradient(135deg, #00f5d4, #0077b6);
            border: none;
            color: #0b0e14;
            font-weight: 700;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            font-family: inherit;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(0, 245, 212, 0.25); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #8aa3bc;
        }
        .btn-outline:hover { border-color: #ff6b6b; color: #ff6b6b; box-shadow: none; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 4px 14px; font-size: 0.85rem; border-radius: 20px; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover { background: #d97706; }
        .login-box { max-width: 400px; margin: 3rem auto; text-align: center; }
        .login-box h2 { color: #00f5d4; margin-bottom: 0.5rem; }
        .login-box .sub { color: #8aa3bc; margin-bottom: 1.5rem; }
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #e8edf5;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
        }
        .login-box input[type="password"]:focus { border-color: #00f5d4; }
        .login-box .error { color: #ff6b6b; margin-top: 0.5rem; display: none; }
        .hidden { display: none; }
        .status-msg { margin-top: 1rem; text-align: center; font-size: 0.95rem; min-height: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .tab-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #8aa3bc;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.3s;
            font-family: inherit;
        }
        .tab-btn.active { background: rgba(0, 245, 212, 0.12); color: #00f5d4; }
        .tab-btn:hover { color: #e8edf5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .footer { text-align: center; color: #5a738a; font-size: 0.8rem; margin-top: 2rem; }
        .footer span { color: #00f5d4; }

        .log-container {
            background: #0a0c10;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            color: #b8ccdd;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 1rem;
        }
        .log-container .log-info { color: #48cae4; }
        .log-container .log-success { color: #00f5d4; }
        .log-container .log-error { color: #ff6b6b; }
        .log-container .log-warn { color: #ffd93d; }

        /* 统一列表样式 */
        .item-list { margin-top: 0.5rem; }
        .item-list .list-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            gap: 1rem;
            flex-wrap: wrap;
        }
        .item-list .list-item:last-child { border-bottom: none; }
        .item-list .list-item .info {
            flex: 1;
            min-width: 200px;
        }
        .item-list .list-item .info .content {
            color: #e8edf5;
            font-size: 0.95rem;
        }
        .item-list .list-item .info .meta {
            font-size: 0.8rem;
            color: #8aa3bc;
            margin-top: 4px;
        }
        .item-list .list-item .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .item-list .list-item .status-badge.pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .item-list .list-item .status-badge.read { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .item-list .list-item .status-badge.resolved { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .item-list .list-item .status-badge.rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .item-list .list-item .status-badge.unread { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .item-list .list-item .status-badge.replied { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .item-list .list-item .actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .item-list .list-item .actions .btn { font-size: 0.75rem; padding: 2px 10px; }

        @media (max-width: 700px) {
            .grid-2 { grid-template-columns: 1fr; }
            .card { padding: 1.2rem; }
            .back-link { top: 10px; left: 10px; font-size: 0.8rem; }
            .list-item { flex-direction: column; align-items: stretch; }
            .list-item .actions { justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← 返回主页</a>

    <div class="container">

        </div>

        <!-- ===== 主面板 ===== -->
        <div id="mainPanel" class="hidden">

                <button class="btn btn-outline" id="logoutBtn">退出登录</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tabPublish">📝 发布文章</button>
                <button class="tab-btn" data-tab="tabManage">📂 管理文章</button>
                <button class="tab-btn" data-tab="tabFeedback">💬 用户反馈</button>
                <button class="tab-btn" data-tab="tabMessages">📩 用户留言</button>
                <button class="tab-btn" data-tab="tabConfig">⚙️ 编辑网站内容</button>
            </div>

            <!-- ===== Tab1: 发布文章 ===== -->
            <div id="tabPublish" class="tab-content active">
                <div class="card">
                    <h2>📝 发布加密文章</h2>
                    <div class="field">
                        <label for="postTitle">文章标题</label>
                        <input type="text" id="postTitle" placeholder="输入文章标题" />
                    </div>
                    <div class="field">
                        <label for="postContent">文章内容（支持 HTML / Markdown）</label>
                        <textarea id="postContent" class="large" placeholder="输入正文"></textarea>
                    </div>
                    <button class="btn" id="publishBtn">🔒 加密并发布</button>
                    <div class="status-msg" id="publishStatus"></div>
                    <div id="logPanel" class="log-container">📋 操作日志将显示在这里...</div>
                </div>
            </div>

            <!-- ===== Tab2: 管理文章 ===== -->
            <div id="tabManage" class="tab-content">
                <div class="card">
                    <h2>📂 管理文章</h2>
                    <p style="color:#8aa3bc; margin-bottom:1rem;">点击「编辑」修改文章，点击「删除」永久移除。</p>
                    <div id="manageArticlesContainer"><div class="status-msg">⏳ 加载中...</div></div>
                    <div id="manageStatus" class="status-msg"></div>
                </div>
            </div>

            <!-- ===== Tab3: 用户反馈 ===== -->
            <div id="tabFeedback" class="tab-content">
                <div class="card">
                    <h2>💬 用户反馈</h2>
                    <p style="color:#8aa3bc; margin-bottom:1rem;">查看所有用户提交的反馈，点击按钮更新状态。</p>
                    <div id="feedbackContainer"><div class="status-msg">⏳ 加载中...</div></div>
                </div>
            </div>

            <!-- ===== Tab4: 用户留言 ===== -->
            <div id="tabMessages" class="tab-content">

                    <h2>📩 用户留言</h2>

                            <div class="field"><label>徽章3 数字</label><input type="text" id="cfg_badge3_num" /></div>
                            <div class="field"><label>徽章3 标签</label><input type="text" id="cfg_badge3_label" /></div>
                        </div>
                        <h3 style="color:#00f5d4; margin:1.5rem 0 0.5rem;">👥 成员页面</h3>

                        <div class="field"><label>副标题</label><input type="text" id="cfg_members_subtitle" /></div>

                        </div>
                        <h3 style="color:#00f5d4; margin:1.5rem 0 0.5rem;">📌 关于页面</h3>
                        <div class="field"><label>标题</label><input type="text" id="cfg_about_title" /></div>
                        <div class="field"><label>副标题</label><input type="text" id="cfg_about_subtitle" /></div>

                        <div class="field"><label>副标题</label><input type="text" id="cfg_contact_subtitle" /></div>
                        <div class="field"><label>地址</label><input type="text" id="cfg_contact_address" /></div>
                        <div class="field"><label>电话</label><input type="text" id="cfg_contact_phone" /></div>
                        <div class="field"><label>邮箱</label><input type="text" id="cfg_contact_email" /></div>
                        <div class="field"><label>官网</label><input type="text" id="cfg_contact_website" /></div>
                        <div class="field"><label>表单标题</label><input type="text" id="cfg_contact_form_title" /></div>
                        <div class="field"><label>表单-姓名标签</label><input type="text" id="cfg_contact_form_name" /></div>
                        <div class="field"><label>表单-邮箱标签</label><input type="text" id="cfg_contact_form_email" /></div>
                        <div class="field"><label>表单-留言标签</label><input type="text" id="cfg_contact_form_message" /></div>
                        <div class="field"><label>表单-提交按钮文字</label><input type="text" id="cfg_contact_form_submit" /></div>
                        <h3 style="color:#00f5d4; margin:1.5rem 0 0.5rem;">📄 页脚</h3>
                        <div class="field"><label>版权信息（支持HTML）</label><input type="text" id="cfg_footer_copyright" /></div>
                        <button type="button" class="btn" id="saveConfigBtn">💾 保存配置</button>
                        <div class="status-msg" id="configStatus"></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="footer">&copy; 2026 <span>ZHDD 网安空间</span> · 管理后台</div>
    </div>

                <button class="btn" id="editSaveBtn">💾 保存</button>

            // ---- Base64 ----
            function unicodeToBase64(str) {
                const u8 = new TextEncoder().encode(str);
                let bin = '';
                for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
                return btoa(bin);
            }

            function base64ToUnicode(b64) {
                const bin = atob(b64);
                const u8 = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
                return new TextDecoder('utf-8').decode(u8);
            }

            function base64ToUint8Array(b64) {
                const bin = atob(b64);
                const u8 = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
                return u8;
            }

            // ---- 加密/解密 ----
            async function encryptText(text, password) {
                if (!password || password.length < 6) throw new Error('密码至少6位');
                const enc = new TextEncoder();
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
                const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
                    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
                const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
                const c = new Uint8Array(encrypted);
                const r = new Uint8Array(salt.length + iv.length + c.length);
                r.set(salt, 0);
                r.set(iv, salt.length);
                r.set(c, salt.length + iv.length);
                return r;
            }

            async function decryptData(data, password) {
                if (!password || password.length < 6) throw new Error('密码至少6位');
                if (!data || data.length < 28) throw new Error('无效数据');
                const salt = data.slice(0, 16);
                const iv = data.slice(16, 28);
                const ct = data.slice(28);
                const enc = new TextEncoder();
                const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
                const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
                    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
                const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
                return new TextDecoder().decode(dec);
            }

                const json = JSON.stringify(cfg, null, 2);
                const b64 = unicodeToBase64(json);
                configStatus.textContent = '⏳ 保存中...';
                configStatus.style.color = '#8aa3bc';
                saveConfigBtn.disabled = true;
                try {
                    let sha = null;
                    const g = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${CONFIG_PATH}`, {
                            headers: { 'Authorization': `Bearer ${HARD_CODED_TOKEN}`, 'Accept': 'application/vnd.github+json' }
                        });
                    if (g.status === 200) { const d = await g.json();
                        sha = d.sha; } else if (g.status !== 404) throw new Error('检查失败');
                    const r = await fetch(
                        `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${CONFIG_PATH}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${HARD_CODED_TOKEN}`, 'Accept': 'application/vnd.github+json',
                                'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: '更新配置', content: b64, sha })
                        });
                    if (r.ok) {
                        configStatus.textContent = '✅ 保存成功！';
                        configStatus.style.color = '#00f5d4';
                    } else { const e = await r.json();
                        throw new Error(e.message); }
                } catch (e) {
                    configStatus.textContent = '❌ ' + e.message;
                    configStatus.style.color = '#ff6b6b';
                } finally { saveConfigBtn.disabled = false; }
            });

            // ---- 初始化 ----
            if (sessionStorage.getItem('admin_logged_in') === 'true') {
                loginArea.style.display = 'none';
                mainPanel.classList.remove('hidden');
                loadConfigToForm();
                loadFeedback();
                loadMessages();
                addLog('已恢复登录', 'info');
            } else {
                loginArea.style.display = 'block';
                mainPanel.classList.add('hidden');
                passwordInput.focus();
                addLog('请登录', 'info');
            }

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && sessionStorage.getItem('admin_logged_in') === 'true') {
                    if (confirm('退出？')) doLogout();
                }
                if (e.key === 'Escape' && editModal.style.display === 'flex') {
                    editModal.style.display = 'none';
                }
            });

        })();
    </script>

</body>
</html>
