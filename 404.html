<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 页面未找到 | ZHDD</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0e17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* ===== 动态星空背景 ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ===== 主卡片 ===== */
        .error-container {
            position: relative;
            z-index: 1;
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 3.5rem 4rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .error-container:hover {
            transform: translateY(-4px);
        }

        /* ===== Logo / 品牌 ===== */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.35);
        }

        .brand-name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #f8f9fc, #c8d0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== 404 大数字 ===== */
        .error-code {
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -6px;
            margin: 0.2rem 0 0.5rem;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: float 4s ease-in-out infinite;
            user-select: none;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) scale(1);
            }
            50% {
                transform: translateY(-12px) scale(1.02);
            }
        }

        /* ===== 小行星装饰 (CSS 图形) ===== */
        .astronaut-emoji {
            font-size: 72px;
            display: inline-block;
            animation: float 5s ease-in-out infinite 0.5s;
            filter: drop-shadow(0 12px 32px rgba(108, 92, 231, 0.25));
            margin: 0.5rem 0;
        }

        /* ===== 标题 & 描述 ===== */
        .error-title {
            font-size: 28px;
            font-weight: 600;
            margin: 0.5rem 0 0.75rem;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .error-desc {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 440px;
            margin: 0 auto 2rem;
            line-height: 1.7;
            font-weight: 400;
        }

        .error-desc strong {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 4px;
            max-width: 480px;
            margin: 0 auto 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .search-box:focus-within {
            border-color: rgba(108, 92, 231, 0.5);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            font-weight: 400;
            min-width: 0;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .search-box button {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
        }

        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 28px rgba(108, 92, 231, 0.45);
        }

        .search-box button:active {
            transform: scale(0.96);
        }

        /* ===== 按钮组 ===== */
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 0.5rem;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            padding: 14px 36px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 16px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(108, 92, 231, 0.45);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            transform: translateY(-3px);
        }

        /* ===== 底部链接 ===== */
        .footer-links {
            margin-top: 2.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 32px;
            font-size: 14px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-links .dot {
            color: rgba(255, 255, 255, 0.1);
            font-weight: 300;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .error-container {
                padding: 2.2rem 1.8rem;
                border-radius: 32px;
            }

            .error-code {
                font-size: 90px;
                letter-spacing: -3px;
            }

            .astronaut-emoji {
                font-size: 52px;
            }

            .error-title {
                font-size: 22px;
            }

            .error-desc {
                font-size: 15px;
                padding: 0 0.2rem;
            }

            .search-box {
                flex-direction: column;
                background: transparent;
                border: none;
                padding: 0;
                gap: 12px;
            }

            .search-box input {
                background: rgba(255, 255, 255, 0.06);
                border-radius: 60px;
                padding: 14px 20px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                width: 100%;
            }

            .search-box button {
                width: 100%;
                justify-content: center;
                padding: 14px;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                justify-content: center;
                padding: 14px 20px;
            }

            .footer-links {
                gap: 12px 20px;
                font-size: 13px;
            }

            .brand-name {
                font-size: 18px;
            }

            .brand-icon {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }

        @media (max-width: 400px) {
            .error-container {
                padding: 1.8rem 1.2rem;
            }

            .error-code {
                font-size: 68px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 星空 ===== -->
    <div class="stars" id="stars"></div>

    <!-- ===== 主内容 ===== -->
    <div class="error-container">

        <!-- 品牌 -->
        <div class="brand">
            <div class="brand-icon">✦</div>
            <span class="brand-name">ZHDD</span>
        </div>

        <!-- 404 数字 -->
        <div class="error-code">404</div>

        <!-- 小宇航员 -->
        <div class="astronaut-emoji">🚀</div>

        <!-- 标题 & 描述 -->
        <h1 class="error-title">ZHDD · 页面失踪</h1>
        <p class="error-desc">
            抱歉，我们没能找到你要访问的页面。<br />
            它可能已被移走、删除，或者<span style="color:rgba(255,255,255,0.4);">掉进了黑洞</span>。
        </p>

        <!-- 搜索 -->
        <div class="search-box">
            <input type="text" placeholder="输入关键词搜索站内内容…" id="searchInput" />
            <button id="searchBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                搜索
            </button>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
            <a href="#" class="btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12l9-9 9 9" />
                    <path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10" />
                </svg>
                返回首页
            </a>
            <a href="#" class="btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                帮助中心
            </a>
        </div>

        <!-- 底部链接 -->
        <div class="footer-links">
            <a href="#">关于我们</a>
            <span class="dot">·</span>
            <a href="#">最新动态</a>
            <span class="dot">·</span>
            <a href="#">技术支持</a>
            <span class="dot">·</span>
            <a href="#">联系团队</a>
        </div>

    </div>

    <script>
        // ===== 生成星空 =====
        (function createStars() {
            const container = document.getElementById('stars');
            const count = 180;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                star.style.animationDelay = (Math.random() * 6) + 's';
                star.style.opacity = Math.random() * 0.6 + 0.2;
                container.appendChild(star);
            }
        })();

        // ===== 搜索框交互 =====
        document.getElementById('searchBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            if (query) {
                alert('🔍 你搜索了：「' + query + '」\n（演示交互，实际站点会跳转搜索结果页）');
            } else {
                alert('💡 输入一些关键词再搜索吧～');
                input.focus();
            }
        });

        // 回车触发搜索
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });

        // ===== 按钮点击演示（可替换为真实链接） =====
        document.querySelectorAll('.btn-primary, .btn-secondary, .footer-links a').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href === '#') {
                    e.preventDefault();
                    alert('📌 这是一个演示链接，在实际网站中会跳转到对应页面。');
                }
            });
        });
    </script>

</body>
</html>
