<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZHDD网安空间</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { text-decoration: none; color: inherit; }

        /* ===== 顶部导航 ===== */
        .navbar {
            background: rgba(13, 18, 28, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 200, 0.15);
            padding: 0 2rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00f5d4;
            text-shadow: 0 0 20px rgba(0, 245, 212, 0.2);
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00f5d4, #0077b6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #0b0e14;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.25);
        }
        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        .nav-links li { display: inline; }
        .nav-btn {
            background: transparent;
            border: none;
            color: #a0b4c8;
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            position: relative;
        }
        .nav-btn:hover { color: #ffffff; background: rgba(0, 245, 212, 0.08); }
        .nav-btn.active {
            color: #00f5d4;
            background: rgba(0, 245, 212, 0.12);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.06);
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #00f5d4;
            border-radius: 4px;
            box-shadow: 0 0 12px #00f5d4;
        }

        /* ===== 主容器 ===== */
        .main-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
            width: 100%;
        }

        /* ===== 页面切换 ===== */
        .page { display: none; animation: fadeUp 0.45s ease forwards; }
        .page.active { display: block; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 首页 ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1rem 2rem;
            min-height: 60vh;
        }
        .hero h1 {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5d4 0%, #48cae4 50%, #0077b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .hero .subtitle {
            font-size: 1.3rem;
            color: #8aa3bc;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
        }
        .hero .desc {
            max-width: 700px;
            font-size: 1.1rem;
            line-height: 1.9;
            color: #b8ccdd;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.8rem 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 212, 0.08);
            backdrop-filter: blur(4px);
        }
        .hero .desc span { color: #00f5d4; font-weight: 600; }
        .badge-grid {
            display: flex;
            gap: 2rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .badge-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 245, 212, 0.10);
            border-radius: 16px;
            padding: 1rem 2rem;
            min-width: 140px;
            text-align: center;
            transition: 0.3s;
        }
        .badge-item:hover {
            border-color: rgba(0, 245, 212, 0.30);
            background: rgba(0, 245, 212, 0.05);
            transform: translateY(-4px);
        }
        .badge-item .number { font-size: 2rem; font-weight: 700; color: #00f5d4; }
        .badge-item .label { font-size: 0.85rem; color: #8aa3bc; margin-top: 4px; }

        /* ===== 成员页面 ===== */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            transition: 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .member-card:hover {
            border-color: rgba(0, 245, 212, 0.20);
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2a3a, #0f1a26);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 300;
            color: #00f5d4;
            border: 2px solid rgba(0, 245, 212, 0.15);
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.04);
        }
        .member-name { font-size: 1.15rem; font-weight: 600; color: #e8edf5; }
        .member-role { font-size: 0.85rem; color: #8aa3bc; margin: 4px 0 10px; }
        .member-desc { font-size: 0.9rem; color: #b0c8dd; line-height: 1.5; opacity: 0.7; font-style: italic; }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #e8edf5;
            letter-spacing: 1px;
        }
        .section-title .highlight { color: #00f5d4; }
        .section-sub { color: #8aa3bc; margin-bottom: 2rem; font-size: 1rem; }

        /* ===== 简介页面 ===== */
        .about-content { max-width: 860px; margin: 0 auto; }
        .about-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 2.5rem 2.8rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }
        .about-block h3 {
            font-size: 1.4rem;
            color: #00f5d4;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .about-block p { line-height: 1.9; color: #b8ccdd; font-size: 1.05rem; }
        .about-block ul { list-style: none; padding: 0; margin-top: 0.8rem; }
        .about-block ul li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #b8ccdd;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .about-block ul li::before { content: '▸'; color: #00f5d4; font-weight: 700; }

        /* ===== 联系页面 ===== */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 1rem;
        }
        .contact-info {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 2rem 2.2rem;
        }
        .contact-info h3 { font-size: 1.3rem; color: #00f5d4; margin-bottom: 1.5rem; }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .contact-item:last-child { border-bottom: none; }
        .contact-item .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0, 245, 212, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #00f5d4;
            flex-shrink: 0;
        }
        .contact-item .info { font-size: 0.98rem; color: #b8ccdd; }
        .contact-item .info strong { color: #e8edf5; font-weight: 500; }

        .contact-form {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 2rem 2.2rem;
        }
        .contact-form h3 { font-size: 1.3rem; color: #00f5d4; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: #8aa3bc;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #e8edf5;
            font-size: 0.98rem;
            font-family: inherit;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #00f5d4;
            box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .submit-btn {
            background: linear-gradient(135deg, #00f5d4, #0077b6);
            border: none;
            color: #0b0e14;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 32px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0, 245, 212, 0.15);
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 245, 212, 0.25);
        }

        /* ===== 文章列表页 ===== */
        .articles-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .articles-header .search-box {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #e8edf5;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            max-width: 300px;
            transition: 0.3s;
        }
        .articles-header .search-box:focus {
            border-color: #00f5d4;
            box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.08);
        }
        .article-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .article-item:hover {
            border-color: rgba(0, 245, 212, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }
        .article-item .title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e8edf5;
        }
        .article-item .meta {
            font-size: 0.85rem;
            color: #8aa3bc;
            margin-top: 4px;
        }
        .article-item .summary {
            color: #b0c8dd;
            font-size: 0.95rem;
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }
        .article-item .full-content {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: #b8ccdd;
            line-height: 1.8;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .article-item.expanded .full-content {
            display: block;
        }
        .article-item.expanded .summary {
            display: none;
        }
        .no-articles {
            text-align: center;
            padding: 3rem;
            color: #5a738a;
            font-size: 1.1rem;
        }
        .articles-loading {
            text-align: center;
            padding: 3rem;
            color: #8aa3bc;
            font-size: 1.1rem;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 2rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: #5a738a;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            background: rgba(13, 18, 28, 0.6);
            backdrop-filter: blur(8px);
        }
        .footer span { color: #00f5d4; }
        .footer .admin-link {
            display: inline-block;
            margin-top: 8px;
            color: #5a738a;
            font-size: 0.85rem;
            transition: 0.3s;
            border-bottom: 1px dashed #5a738a;
        }
        .footer .admin-link:hover {
            color: #00f5d4;
            border-bottom-color: #00f5d4;
        }

        /* ===== 加载动画 ===== */
        .loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0b0e14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .hourglass {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
            animation: spin 2s linear infinite;
        }
        .hourglass::before,
        .hourglass::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-style: solid;
            border-color: #00f5d4 transparent transparent transparent;
        }
        .hourglass::before {
            top: 0;
            border-width: 30px 40px 0 40px;
            animation: drop 1.5s ease-in-out infinite;
        }
        .hourglass::after {
            bottom: 0;
            border-width: 0 40px 30px 40px;
            border-color: transparent transparent #00f5d4 transparent;
            animation: fill 1.5s ease-in-out infinite;
        }
        .hourglass .sand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #00f5d4;
            border-radius: 50%;
            animation: sandFlow 1.5s ease-in-out infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes drop {
            0%, 20% { top: 0; opacity: 1; }
            80%, 100% { top: 40px; opacity: 0; }
        }
        @keyframes fill {
            0%, 20% { bottom: 0; opacity: 0; }
            80%, 100% { bottom: 40px; opacity: 1; }
        }
        @keyframes sandFlow {
            0%, 20% { transform: translate(-50%, -20px); opacity: 1; }
            80%, 100% { transform: translate(-50%, 20px); opacity: 0; }
        }
        .loading-mask p {
            margin-top: 20px;
            color: #8aa3bc;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .navbar { padding: 0 1.2rem; height: 64px; flex-wrap: wrap; }
            .logo { font-size: 1.2rem; }
            .logo-icon { width: 30px; height: 30px; font-size: 14px; }
            .nav-links { gap: 4px; }
            .nav-btn { font-size: 0.85rem; padding: 6px 14px; }
            .hero h1 { font-size: 2.4rem; }
            .hero .desc { padding: 1.2rem 1.5rem; font-size: 0.98rem; }
            .contact-wrapper { grid-template-columns: 1fr; gap: 1.5rem; }
            .about-block { padding: 1.5rem 1.2rem; }
            .members-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
            .badge-grid { gap: 1rem; }
            .badge-item { padding: 0.8rem 1.2rem; min-width: 100px; }
            .badge-item .number { font-size: 1.5rem; }
            .articles-header .search-box { max-width: 100%; }
        }
        @media (max-width: 480px) {
            .navbar { padding: 0 0.8rem; height: 58px; }
            .nav-btn { font-size: 0.75rem; padding: 4px 10px; }
            .logo { font-size: 1rem; }
            .logo-icon { width: 26px; height: 26px; font-size: 12px; }
            .hero h1 { font-size: 1.8rem; }
            .hero .subtitle { font-size: 0.95rem; letter-spacing: 2px; }
            .section-title { font-size: 1.5rem; }
            .member-card { padding: 1.2rem 0.8rem; }
            .article-item { padding: 1rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- ===== 加载遮罩 ===== -->
    <div id="loadingMask" class="loading-mask">
        <div class="hourglass"><div class="sand"></div></div>
        <p>加载中...</p>
    </div>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">Z</span>
            <span id="brandName"></span>
        </div>
        <ul class="nav-links">
            <li><button class="nav-btn active" data-page="home">首页</button></li>
            <li><button class="nav-btn" data-page="members">成员</button></li>
            <li><button class="nav-btn" data-page="about">简介</button></li>
            <li><button class="nav-btn" data-page="contact">联系</button></li>
            <li><button class="nav-btn" data-page="articles">📄 文章</button></li>
        </ul>
    </nav>

    <!-- ===== 主容器 ===== -->
    <div class="main-container">

        <!-- ====== 首页 ====== -->
        <section id="page-home" class="page active">
            <div class="hero">
                <h1 id="homeTitle"></h1>
                <p class="subtitle" id="homeSubtitle"></p>
                <div class="desc" id="homeDesc"></div>
                <div class="badge-grid" id="badgeGrid"></div>
            </div>
        </section>

        <!-- ====== 成员 ====== -->
        <section id="page-members" class="page">
            <h2 class="section-title" id="membersTitle"></h2>
            <p class="section-sub" id="membersSub"></p>
            <div class="members-grid" id="membersGrid"></div>
        </section>

        <!-- ====== 简介 ====== -->
        <section id="page-about" class="page">
            <div class="about-content">
                <h2 class="section-title" id="aboutTitle"></h2>
                <p class="section-sub" id="aboutSub"></p>
                <div class="about-block">
                    <h3>🛡️ 我们的使命</h3>
                    <p id="aboutMission"></p>
                </div>
                <div class="about-block">
                    <h3>⚡ 核心能力</h3>
                    <ul id="aboutAbilities"></ul>
                </div>
                <div class="about-block">
                    <h3>🌐 价值观</h3>
                    <p id="aboutValues"></p>
                </div>
            </div>
        </section>

        <!-- ====== 联系 ====== -->
        <section id="page-contact" class="page">
            <h2 class="section-title" id="contactTitle"></h2>
            <p class="section-sub" id="contactSub"></p>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <h3 id="contactInfoTitle"></h3>
                    <div id="contactItems"></div>
                </div>
                <div class="contact-form">
                    <h3 id="contactFormTitle"></h3>
                    <form id="contactForm" onsubmit="return handleSubmit(event)">
                        <div class="form-group">
                            <label id="contactFormNameLabel" for="name"></label>
                            <input type="text" id="name" placeholder="请输入姓名" required />
                        </div>
                        <div class="form-group">
                            <label id="contactFormEmailLabel" for="email"></label>
                            <input type="email" id="email" placeholder="请输入邮箱" required />
                        </div>
                        <div class="form-group">
                            <label id="contactFormMessageLabel" for="message"></label>
                            <textarea id="message" placeholder="请描述您的需求…" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" id="contactFormSubmitBtn"></button>
                    </form>
                </div>
            </div>
        </section>

        <!-- ====== 文章列表 ====== -->
        <section id="page-articles" class="page">
            <div class="articles-header">
                <h2 class="section-title" style="margin-bottom:0;">📄 文章列表</h2>
                <input type="text" id="articleSearch" class="search-box" placeholder="🔍 搜索标题..." />
            </div>
            <div id="articlesContainer">
                <div class="articles-loading">⏳ 加载文章中...</div>
            </div>
        </section>

    </div>

    <!-- ===== 页脚 ===== -->
    <footer class="footer">
        <span id="footerCopyright"></span>
        <br />
        <a href="admin.html" class="admin-link">🔧 管理后台</a>
    </footer>

    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ======== 配置 ========
            const GITHUB_USERNAME = 'kali0914';
            const REPO_NAME = 'zhdd.bbroot.com';
            const CONFIG_PATH = 'site_config.json';
            const CACHE_KEY = 'site_config_cache';
            const FIXED_PASSWORD = '070301'; // 解密密码

            // ---- DOM ----
            const navBtns = document.querySelectorAll('.nav-btn');
            const pages = {
                home: document.getElementById('page-home'),
                members: document.getElementById('page-members'),
                about: document.getElementById('page-about'),
                contact: document.getElementById('page-contact'),
                articles: document.getElementById('page-articles'),
            };
            const loadingMask = document.getElementById('loadingMask');
            const articlesContainer = document.getElementById('articlesContainer');
            const searchInput = document.getElementById('articleSearch');

            let allArticles = []; // 缓存文章列表 { title, time, content, filename }

            // ---- 工具：Base64 ----
            function base64ToUint8Array(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes;
            }

            // ---- 解密（与 admin 一致） ----
            async function decryptData(data, password) {
                if (!password || password.length < 6) throw new Error('密码至少6位');
                if (!data || data.length < 28) throw new Error('无效的加密数据');
                const salt = data.slice(0, 16);
                const iv = data.slice(16, 28);
                const ciphertext = data.slice(28);
                const encoder = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    'raw',
                    encoder.encode(password),
                    'PBKDF2',
                    false,
                    ['deriveKey']
                );
                const key = await crypto.subtle.deriveKey({
                        name: 'PBKDF2',
                        salt: salt,
                        iterations: 200000,
                        hash: 'SHA-256'
                    },
                    keyMaterial, {
                        name: 'AES-GCM',
                        length: 256
                    },
                    false,
                    ['decrypt']
                );
                const decrypted = await crypto.subtle.decrypt({
                        name: 'AES-GCM',
                        iv: iv
                    },
                    key,
                    ciphertext
                );
                return new TextDecoder().decode(decrypted);
            }

            // ---- 加载文章列表 ----
            async function loadArticles() {
                articlesContainer.innerHTML = '<div class="articles-loading">⏳ 加载文章中...</div>';
                try {
                    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/`;
                    const res = await fetch(url, {
                        headers: { 'Accept': 'application/vnd.github+json' }
                    });
                    if (!res.ok) throw new Error('无法获取文件列表');
                    const files = await res.json();
                    const zhddFiles = files.filter(f => f.name.endsWith('.zhdd') && f.type === 'file');
                    if (zhddFiles.length === 0) {
                        articlesContainer.innerHTML = '<div class="no-articles">📭 暂无文章</div>';
                        allArticles = [];
                        return;
                    }

                    const articles = [];
                    for (const file of zhddFiles) {
                        try {
                            const contentRes = await fetch(file.download_url);
                            if (!contentRes.ok) continue;
                            const arrayBuffer = await contentRes.arrayBuffer();
                            const data = new Uint8Array(arrayBuffer);
                            const decryptedJson = await decryptData(data, FIXED_PASSWORD);
                            const article = JSON.parse(decryptedJson);
                            articles.push({
                                title: article.title || '无标题',
                                time: article.time || '未知时间',
                                content: article.content || '',
                                filename: file.name
                            });
                        } catch (e) {
                            console.warn('解密失败:', file.name, e);
                        }
                    }
                    // 按时间倒序
                    articles.sort((a, b) => (a.time < b.time ? 1 : -1));
                    allArticles = articles;
                    renderArticles(articles);
                } catch (err) {
                    console.error(err);
                    articlesContainer.innerHTML = `<div class="no-articles">❌ 加载失败: ${err.message}</div>`;
                }
            }

            // ---- 渲染文章列表 ----
            function renderArticles(articles) {
                if (!articles || articles.length === 0) {
                    articlesContainer.innerHTML = '<div class="no-articles">📭 暂无文章</div>';
                    return;
                }
                let html = '';
                for (const art of articles) {
                    const summary = art.content.substring(0, 150) + (art.content.length > 150 ? '...' : '');
                    html += `
                        <div class="article-item" data-title="${art.title.toLowerCase()}" data-content="${art.content}">
                            <div class="title">${art.title}</div>
                            <div class="meta">🕒 ${art.time}</div>
                            <div class="summary">${summary}</div>
                            <div class="full-content">${art.content}</div>
                        </div>
                    `;
                }
                articlesContainer.innerHTML = html;
                // 点击展开
                document.querySelectorAll('.article-item').forEach(item => {
                    item.addEventListener('click', function() {
                        this.classList.toggle('expanded');
                    });
                });
            }

            // ---- 搜索过滤 ----
            searchInput.addEventListener('input', function() {
                const keyword = this.value.trim().toLowerCase();
                if (!keyword) {
                    renderArticles(allArticles);
                } else {
                    const filtered = allArticles.filter(art => art.title.toLowerCase().includes(keyword));
                    renderArticles(filtered);
                }
            });

            // ---- 渲染主页面配置（原有功能） ----
            function renderConfig(config) {
                document.getElementById('homeTitle').textContent = config.home.title;
                document.getElementById('homeSubtitle').textContent = config.home.subtitle;
                document.getElementById('homeDesc').innerHTML = config.home.description;
                const badgeGrid = document.getElementById('badgeGrid');
                badgeGrid.innerHTML = config.home.badges.map(b =>
                    `<div class="badge-item"><div class="number">${b.number}</div><div class="label">${b.label}</div></div>`
                ).join('');

                document.getElementById('membersTitle').innerHTML = config.members.title;
                document.getElementById('membersSub').textContent = config.members.subtitle;
                const membersGrid = document.getElementById('membersGrid');
                if (config.members.list && config.members.list.length) {
                    membersGrid.innerHTML = config.members.list.map(m =>
                        `<div class="member-card">
                            <div class="member-avatar">👤</div>
                            <div class="member-name">${m.name}</div>
                            <div class="member-role">${m.role}</div>
                            <div class="member-desc">${m.desc}</div>
                        </div>`
                    ).join('');
                } else {
                    membersGrid.innerHTML = '<p style="color:#8aa3bc;">暂无成员信息</p>';
                }

                document.getElementById('aboutTitle').innerHTML = config.about.title;
                document.getElementById('aboutSub').textContent = config.about.subtitle;
                document.getElementById('aboutMission').innerHTML = config.about.mission;
                document.getElementById('aboutAbilities').innerHTML = config.about.abilities.map(a =>
                    `<li>${a}</li>`
                ).join('');
                document.getElementById('aboutValues').innerHTML = config.about.values;

                document.getElementById('contactTitle').innerHTML = config.contact.title;
                document.getElementById('contactSub').textContent = config.contact.subtitle;
                document.getElementById('contactInfoTitle').textContent = config.contact.info_title || '联系方式';
                const contactItems = document.getElementById('contactItems');
                if (config.contact.items && config.contact.items.length) {
                    contactItems.innerHTML = config.contact.items.map(item =>
                        `<div class="contact-item">
                            <div class="icon">${item.icon}</div>
                            <div class="info"><strong>${item.label}</strong><br />${item.value}</div>
                        </div>`
                    ).join('');
                } else {
                    contactItems.innerHTML = '<p style="color:#8aa3bc;">暂无联系信息</p>';
                }

                document.getElementById('contactFormTitle').textContent = config.contact.form_title;
                document.getElementById('contactFormNameLabel').textContent = config.contact.form_name_label;
                document.getElementById('contactFormEmailLabel').textContent = config.contact.form_email_label;
                document.getElementById('contactFormMessageLabel').textContent = config.contact.form_message_label;
                document.getElementById('contactFormSubmitBtn').textContent = config.contact.form_submit_label;

                document.getElementById('footerCopyright').innerHTML = config.footer.copyright;
                document.getElementById('brandName').textContent = config.home.title;
            }

            // ---- 加载配置（缓存优先） ----
            function loadConfig() {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    try {
                        const config = JSON.parse(cached);
                        renderConfig(config);
                        loadingMask.classList.add('hidden');
                        console.log('✅ 使用缓存配置');
                    } catch (e) { console.warn('缓存解析失败', e); }
                }

                fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/${CONFIG_PATH}`)
                    .then(res => {
                        if (!res.ok) throw new Error('Config not found');
                        return res.json();
                    })
                    .then(config => {
                        localStorage.setItem(CACHE_KEY, JSON.stringify(config));
                        renderConfig(config);
                        loadingMask.classList.add('hidden');
                        console.log('✅ 远程配置加载成功');
                    })
                    .catch(err => {
                        console.warn('⚠️ 远程配置加载失败:', err);
                        loadingMask.classList.add('hidden');
                    });
            }

            // ---- 切换页面 ----
            function switchPage(pageId) {
                Object.values(pages).forEach(p => p.classList.remove('active'));
                if (pages[pageId]) pages[pageId].classList.add('active');
                navBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.page === pageId) btn.classList.add('active');
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // 切换到文章页时加载列表
                if (pageId === 'articles') {
                    loadArticles();
                }
            }

            navBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const pageId = this.dataset.page;
                    if (pageId) switchPage(pageId);
                });
            });

            // ---- 联系表单 ----
            window.handleSubmit = function(e) {
                e.preventDefault();
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const message = document.getElementById('message').value.trim();
                if (!name || !email || !message) {
                    alert('请完整填写所有字段 🙏');
                    return false;
                }
                alert('✅ 留言已发送！我们会尽快与您联系。\n（此功能为演示）');
                document.getElementById('contactForm').reset();
                return false;
            };

            // ---- hash路由 ----
            function handleHash() {
                const hash = window.location.hash.slice(1) || 'home';
                if (pages[hash]) switchPage(hash);
            }
            window.addEventListener('hashchange', handleHash);
            if (window.location.hash) { handleHash(); } else { switchPage('home'); }
            window.switchPage = switchPage;

            // ---- 启动 ----
            loadConfig();

        })();
    </script>

</body>
